<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="shell">

  <div id="titlebar">
    <span id="titlebar-label">Lura Overlay <span id="role-tag"></span></span>
    <div id="titlebar-right">
      <button id="settings-btn" title="Settings">⚙</button>
      <button id="close-btn" title="Close"></button>
    </div>
  </div>

  <div id="settings-panel">
    <div class="setting-row">
      <label>Mode</label>
      <div id="settings-mode-bar">
        <button class="mode-btn"        id="btn-leader" onclick="setMode('leader')">Leader</button>
        <button class="mode-btn active" id="btn-viewer" onclick="setMode('viewer')">Viewer</button>
      </div>
    </div>
    <div class="setting-row" id="difficulty-setting-row">
      <label>Difficulty</label>
      <div id="settings-difficulty-bar">
        <button class="mode-btn"        id="btn-difficulty-heroic" onclick="setDifficulty('H')">Heroic</button>
        <button class="mode-btn active" id="btn-difficulty-mythic" onclick="setDifficulty('M')">Mythic</button>
      </div>
    </div>
    <div class="setting-row" id="layout-setting-row">
      <label>Layout</label>
      <div id="settings-layout-bar">
        <button class="mode-btn active" id="btn-layout-line"  onclick="setLayout('line')">Line</button>
        <button class="mode-btn"        id="btn-layout-clock" onclick="setLayout('clock')">Clock</button>
      </div>
    </div>
    <div class="setting-row" id="person-setting-row">
      <label>Role</label>
      <div id="settings-person-bar">
        <button class="mode-btn active" id="btn-person-a"  onclick="setPersonType('tank')">Tank</button>
        <button class="mode-btn"        id="btn-person-bc" onclick="setPersonType('healer')">Healer</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Ably API Key</label>
      <div id="ably-key-input-wrap">
        <input id="ably-key-input" type="password" placeholder="paste your key here…" autocomplete="off" spellcheck="false">
        <button id="save-key-btn" onclick="saveAblyKey()">Save & Connect</button>
      </div>
      <div id="key-status"></div>
    </div>
  </div>

  <div id="main-content">

    <div id="role-picker">
      <div id="role-picker-btns">
        <button class="role-pick-btn pick-b" onclick="pickRole('R')">Red</button>
        <button class="role-pick-btn pick-c" onclick="pickRole('B')">Blue</button>
      </div>
    </div>

    <div id="buttons"></div>

    <div id="sequences">
      <div class="seq-row" id="majority-row">
        <div class="seq-slots" id="majority-slots"></div>
      </div>
      <hr>
    </div>

    <div id="bottom-bar">
      <div id="status">Ably: not connected</div>
      <div id="bottom-bar-actions">
        <span id="phase-indicator"></span>
        <button id="reset-phase-btn" onclick="resetPhase()">Clear Phase</button>
        <button id="clear-btn" onclick="clearSequence()">Clear All</button>
      </div>
    </div>

  </div>

  <div id="resize-handle"></div>

</div>
<script>
  const { ipcRenderer } = require('electron')

  const CHANNEL      = 'overlay-sequence'
  const SLOTS        = 5
  const ALL_SYMS     = [1, 2, 3, 4, 5]
  const IMG          = n => `images/${n}.png`
  const KEY_STORE    = 'overlay_ably_key'
  const ID_STORE     = 'overlay_leader_id'
  const PTYPE_STORE  = 'overlay_person_type'
  const ROLE_STORE   = 'overlay_bc_role'
  const DIFF_STORE   = 'overlay_difficulty'
  const LAYOUT_STORE = 'overlay_layout'

  // Slot ownership by phase:
  //   T (Tank) owns slots 1 & 4
  //   R (Red phase)  owns slots 2 & 5
  //   B (Blue phase) owns slot 3
  const ROLE_SLOTS  = { T: [1, 4], R: [2, 5], B: [3] }
  const ROLE_LABELS = { T: 'Tank', R: 'Red', B: 'Blue' }
  const BASE_W      = 360           // design width at scale 1
  const MIN_SCALE   = 0.6
  const MAX_SCALE   = 3.0

  // Allowed values for each persisted setting — anything else falls back to the default.
  // This protects against stale values in localStorage from previous versions of the app.
  const ALLOWED_DIFF   = ['H', 'M']
  const ALLOWED_PTYPE  = ['tank', 'healer']
  const ALLOWED_LAYOUT = ['line', 'clock']

  function readEnum(key, allowed, fallback) {
    const v = localStorage.getItem(key)
    return allowed.includes(v) ? v : fallback
  }

  function mySlots() {
    if (difficulty === 'H') return [1, 2, 3, 4, 5]
    return myRole ? ROLE_SLOTS[myRole] : []
  }

  // ── State ─────────────────────────────────────────────
  let mode       = 'viewer'
  let difficulty = readEnum(DIFF_STORE,   ALLOWED_DIFF,   'M')
  let personType = readEnum(PTYPE_STORE,  ALLOWED_PTYPE,  'tank')
  let layout     = readEnum(LAYOUT_STORE, ALLOWED_LAYOUT, 'line')
  let myRole     = null
  let settingsOpen = false
  let mySequence = {}
  let peerMap    = {}
  let ablyClient = null
  let channel    = null
  let resizing   = false

  const MY_ID = (() => {
    let id = localStorage.getItem(ID_STORE)
    if (!id) { id = Math.random().toString(36).slice(2, 8); localStorage.setItem(ID_STORE, id) }
    return id
  })()

  if (personType === 'tank') myRole = 'T'

  // ── Scale factor from window size ─────────────────────
  ipcRenderer.on('window-size', (e, [w]) => {
    document.documentElement.style.setProperty('--s', (w / BASE_W).toFixed(4))
  })

  // ── Fit window to content ──────────────────────────────
  function fitToContent() {
    requestAnimationFrame(() => {
      const scale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--s')) || 1

      let measuredH = 0
      const shell = document.getElementById('shell')

      for (const child of shell.children) {
        if (child.offsetParent === null && child !== document.body) continue
        if (child.id === 'main-content') {
          for (const inner of child.children) {
            if (inner.offsetParent === null) continue
            if (getComputedStyle(inner).display === 'none') continue
            measuredH += inner.getBoundingClientRect().height
          }
        } else {
          measuredH += child.getBoundingClientRect().height
        }
      }

      measuredH += 2

      const baseH = Math.ceil(measuredH / scale)
      ipcRenderer.send('fit-content', { baseH })
    })
  }

  // ── Settings ───────────────────────────────────────────
  const settingsBtn   = document.getElementById('settings-btn')
  const settingsPanel = document.getElementById('settings-panel')
  const mainContent   = document.getElementById('main-content')
  const ablyInput     = document.getElementById('ably-key-input')

  settingsBtn.addEventListener('click', () => {
    settingsOpen = !settingsOpen
    settingsPanel.classList.toggle('open', settingsOpen)
    mainContent.classList.toggle('settings-open', settingsOpen)
    if (settingsOpen) {
      const stored = localStorage.getItem(KEY_STORE)
      if (stored) ablyInput.value = stored
      syncPersonButtons()
    }
    fitToContent()
  })

  ablyInput.addEventListener('click', () => { ipcRenderer.send('set-focusable', true); setTimeout(() => ablyInput.focus(), 50) })
  ablyInput.addEventListener('blur',  () => ipcRenderer.send('set-focusable', false))

  function saveAblyKey() {
    const key = ablyInput.value.trim()
    if (!key) { setKeyStatus('Please enter a key'); return }
    localStorage.setItem(KEY_STORE, key)
    setKeyStatus('Saved — connecting…')
    connectAbly(key)
  }
  function setKeyStatus(msg) { document.getElementById('key-status').textContent = msg }

  // ── Layout (viewer-only) ───────────────────────────────
  function setLayout(l) {
    layout = l
    localStorage.setItem(LAYOUT_STORE, l)
    syncLayoutButtons()
    renderAll()
  }

  function syncLayoutButtons() {
    document.getElementById('btn-layout-line').classList.toggle('active', layout === 'line')
    document.getElementById('btn-layout-clock').classList.toggle('active', layout === 'clock')
  }

  // ── Difficulty ─────────────────────────────────────────
  function setDifficulty(d) {
    difficulty = d
    localStorage.setItem(DIFF_STORE, d)
    mySequence = {}
    if (d === 'H') {
      myRole = 'T'
      localStorage.removeItem(ROLE_STORE)
    } else {
      myRole = (personType === 'tank') ? 'T' : null
    }
    syncDifficultyButtons(); syncPersonButtons(); syncSettingVisibility(); applyRoleState(); renderAll()
  }

  function syncDifficultyButtons() {
    document.getElementById('btn-difficulty-heroic').classList.toggle('active', difficulty === 'H')
    document.getElementById('btn-difficulty-mythic').classList.toggle('active', difficulty === 'M')
  }

  // ── Person type ────────────────────────────────────────
  function setPersonType(pt) {
    personType = pt
    localStorage.setItem(PTYPE_STORE, pt)
    myRole = (pt === 'tank') ? 'T' : null
    if (pt !== 'tank') localStorage.removeItem(ROLE_STORE)
    syncPersonButtons(); applyRoleState(); renderAll()
  }

  function syncPersonButtons() {
    document.getElementById('btn-person-a').classList.toggle('active',  personType === 'tank')
    document.getElementById('btn-person-bc').classList.toggle('active', personType === 'healer')
  }

  function syncSettingVisibility() {
    const isViewer = mode === 'viewer'
    const diffRow   = document.getElementById('difficulty-setting-row')
    const personRow = document.getElementById('person-setting-row')
    const layoutRow = document.getElementById('layout-setting-row')

    diffRow.style.display   = isViewer ? 'none' : ''
    personRow.style.display = (isViewer || difficulty === 'H') ? 'none' : ''
    layoutRow.style.display = isViewer ? '' : 'none'
  }

  // ── Phase picker (R/B) ─────────────────────────────────
  function pickRole(r) {
    myRole = r
    localStorage.setItem(ROLE_STORE, r)
    applyRoleState(); renderAll()
  }

  function applyRoleState() {
    const picker         = document.getElementById('role-picker')
    const buttons        = document.getElementById('buttons')
    const clearBtn       = document.getElementById('clear-btn')
    const resetPhaseBtn  = document.getElementById('reset-phase-btn')
    const phaseIndicator = document.getElementById('phase-indicator')
    const roleTag        = document.getElementById('role-tag')

    const isViewer  = (mode === 'viewer')
    const isHeroic  = (difficulty === 'H')
    const needsRolePick = (!isViewer && !isHeroic && personType === 'healer' && myRole === null)

    picker.classList.toggle('visible',  needsRolePick)
    buttons.classList.toggle('hidden',  isViewer || needsRolePick)
    clearBtn.classList.toggle('hidden', isViewer || needsRolePick)

    const showPhaseControls = !isViewer && !isHeroic && personType === 'healer' && myRole !== null
    resetPhaseBtn.classList.toggle('hidden', !showPhaseControls)
    phaseIndicator.classList.toggle('hidden', !showPhaseControls)

    phaseIndicator.className = 'hidden'
    if (showPhaseControls) {
      phaseIndicator.classList.remove('hidden')
      phaseIndicator.textContent = ROLE_LABELS[myRole]
      phaseIndicator.classList.add(myRole === 'R' ? 'phase-red' : 'phase-blue')
    }

    if (isViewer)        roleTag.textContent = '· Viewer'
    else if (isHeroic)   roleTag.textContent = '· Leader'
    else if (myRole)     roleTag.textContent = `· ${ROLE_LABELS[myRole]}`
    else                 roleTag.textContent = '· Healer'

    buildInputButtons()
  }

  // ── Mode ───────────────────────────────────────────────
  function setMode(m) {
    mode = m
    document.getElementById('btn-leader').classList.toggle('active', m === 'leader')
    document.getElementById('btn-viewer').classList.toggle('active', m === 'viewer')
    if (m === 'viewer') mySequence = {}
    syncPersonButtons(); syncSettingVisibility(); applyRoleState(); renderAll()
  }

  // ── Input buttons ──────────────────────────────────────
  function buildInputButtons() {
    const container = document.getElementById('buttons')
    container.innerHTML = ''

    if (mode === 'viewer') return
    if (difficulty === 'M' && personType === 'healer' && myRole === null) return

    const slots   = mySlots()
    const filled  = slots.filter(s => mySequence[s] !== undefined)
    const allFull = filled.length === slots.length

    ALL_SYMS.forEach(sym => {
      const btn = document.createElement('button')
      btn.className = 'img-btn'
      btn.disabled  = allFull
      btn.onclick   = () => handleClick(sym)
      const img = document.createElement('img')
      img.src = IMG(sym); img.alt = sym
      btn.appendChild(img)
      container.appendChild(btn)
    })

    const back = document.createElement('button')
    back.className   = 'back-btn'
    back.title       = 'Undo last'
    back.textContent = '⌫'
    back.disabled    = filled.length === 0
    back.onclick     = () => {
      delete mySequence[filled[filled.length - 1]]
      buildInputButtons(); renderAll(); publish()
    }
    container.appendChild(back)
  }

  // ── Button logic ───────────────────────────────────────
  function handleClick(sym) {
    if (mode !== 'leader') return
    if (difficulty === 'M' && personType === 'healer' && myRole === null) return
    const nextSlot = mySlots().find(s => mySequence[s] === undefined)
    if (nextSlot === undefined) return
    mySequence[nextSlot] = sym
    buildInputButtons(); renderAll(); publish()
  }

  function clearSequence() {
    mySequence = {}
    peerMap = {}
    if (difficulty === 'M' && personType === 'healer') {
      myRole = null
      localStorage.removeItem(ROLE_STORE)
    }
    applyRoleState(); buildInputButtons(); renderAll()
    if (channel) channel.publish('reset', { id: MY_ID })
    publish()
  }

  function resetPhase() {
    if (difficulty !== 'M' || personType !== 'healer') return
    if (myRole) {
      ROLE_SLOTS[myRole].forEach(slot => { delete mySequence[slot] })
      publish()
    }

    myRole = null
    localStorage.removeItem(ROLE_STORE)
    applyRoleState(); 
    renderAll(); 
  }

  // ── Assemble + predict ─────────────────────────────────
  function assembleSequence() {
    const seq = Array(SLOTS).fill(null)
    if (myRole) Object.entries(mySequence).forEach(([si, sv]) => { seq[+si - 1] = sv })
    if (difficulty === 'M') {
      Object.values(peerMap).forEach(({ role, slots }) => {
        if (!role || !slots) return
        Object.entries(slots).forEach(([si, sv]) => { seq[+si - 1] = sv })
      })
    }
    return seq
  }

  function predict(seq) {
    const filled = seq.filter(v => v !== null)
    if (filled.length !== 4) return seq
    const missing = ALL_SYMS.find(s => !new Set(filled).has(s))
    if (missing === undefined) return seq
    return seq.map(v => v === null ? missing : v)
  }

  // ── Render ─────────────────────────────────────────────
  function renderAll() {
    const raw  = assembleSequence()
    const full = predict(raw)
    renderMajority(full, raw)
    renderMyRow(full)
    fitToContent()
  }

  function makeImgSlot(value, extraClass) {
    const d = document.createElement('div')
    d.className = 'slot' + (extraClass ? ' ' + extraClass : '') + (value === null ? ' empty' : '')
    if (value !== null) {
      const img = document.createElement('img')
      img.src = IMG(value); img.alt = value
      d.appendChild(img)
    }
    return d
  }

  function renderMajority(full, raw) {
    const row = document.getElementById('majority-row')
    const el  = document.getElementById('majority-slots')

    const useClock = (mode === 'viewer' && layout === 'clock')
    row.classList.toggle('clock', useClock)
    el.classList.toggle('clock', useClock)
    el.innerHTML = ''

    full.forEach((v, i) => {
      const predicted = raw[i] === null && v !== null
      const slot = makeImgSlot(v, v !== null ? (predicted ? 'predicted' : 'majority') : '')
      if (useClock) slot.classList.add(`clock-slot-${i}`)
      el.appendChild(slot)
    })
  }

  function renderMyRow(full) {
    document.querySelectorAll('.leader-row').forEach(r => r.remove())

    if (mode === 'viewer') return

    const container = document.getElementById('sequences')
    const needsPick = (difficulty === 'M' && personType === 'healer' && myRole === null)
    const slots     = needsPick ? [] : mySlots()

    const row     = document.createElement('div'); row.className = 'seq-row leader-row'
    const slotsEl = document.createElement('div'); slotsEl.className = 'seq-slots'

    for (let i = 0; i < SLOTS; i++) {
      const owned = slots.includes(i + 1)
      slotsEl.appendChild(makeImgSlot(
        owned ? (mySequence[i + 1] ?? null) : full[i],
        owned ? '' : 'foreign'
      ))
    }

    row.appendChild(slotsEl)
    container.appendChild(row)
  }

  // ── Ably ───────────────────────────────────────────────
  function connectAbly(key) {
    if (ablyClient) { try { ablyClient.close() } catch(e) {} }
    try {
      ablyClient = new Ably.Realtime({ key })
      channel = ablyClient.channels.get(CHANNEL)
      ablyClient.connection.on('connected',    () => { setStatus('Ably: connected ✓'); setKeyStatus('Connected ✓') })
      ablyClient.connection.on('disconnected', () => setStatus('Ably: disconnected'))
      ablyClient.connection.on('failed',       () => { setStatus('Ably: failed'); setKeyStatus('Connection failed — check key') })
      channel.subscribe('sequence', msg => {
        const { id, role, slots } = msg.data
        if (id === MY_ID) return
        if (!peerMap[id]) peerMap[id] = {}
        peerMap[id].role = role; peerMap[id].slots = slots
        renderAll()
      })

      channel.subscribe('reset', msg => {
        if (msg.data.id === MY_ID) return
        peerMap = {}
        mySequence = {}
        if (difficulty === 'M' && personType === 'healer') {
          myRole = null
          localStorage.removeItem(ROLE_STORE)
        }
        applyRoleState(); buildInputButtons(); renderAll()
      })
    } catch(e) { setStatus('Ably error'); setKeyStatus('Error — check key format') }
  }

  function publish() {
    if (!channel) return
    if (difficulty === 'M' && personType === 'healer' && myRole === null) return
    channel.publish('sequence', { id: MY_ID, role: myRole, slots: mySequence, difficulty })
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg }

  // ── Drag to move ───────────────────────────────────────
  document.getElementById('close-btn').addEventListener('click', () => ipcRenderer.send('close-app'))

  // ── Resize handle ──────────────────────────────────────
  document.getElementById('resize-handle').addEventListener('mousedown', e => {
    e.stopPropagation()
    e.preventDefault()
    resizing = true
    ipcRenderer.send('resize-start', { minScale: MIN_SCALE, maxScale: MAX_SCALE, baseW: BASE_W })
  })

  document.addEventListener('mousemove', () => {
    if (!resizing) return
    ipcRenderer.send('resize-move')
  })

  document.addEventListener('mouseup', () => {
    if (!resizing) return
    resizing = false
    ipcRenderer.send('resize-end')
  })

  // ── Boot ───────────────────────────────────────────────
  const s = document.createElement('script')
  s.src = 'https://cdn.ably.com/lib/ably.min-2.js'
  s.onload = () => {
    const stored = localStorage.getItem(KEY_STORE)
    if (stored) { ablyInput.value = stored; connectAbly(stored) }
    else setStatus('Open settings to add Ably key')
  }
  s.onerror = () => setStatus('Failed to load Ably SDK')
  document.head.appendChild(s)

  localStorage.removeItem(ROLE_STORE)

  if (difficulty === 'H') myRole = 'T'

  syncDifficultyButtons()
  syncPersonButtons()
  syncLayoutButtons()
  syncSettingVisibility()
  applyRoleState()
  renderAll()
</script>
</body>
</html>
