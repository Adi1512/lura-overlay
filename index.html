<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: transparent; margin: 0; }

    #shell {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      background: rgba(15, 15, 25, 0.88);
      color: #fff;
      font-family: sans-serif;
      user-select: none;
    }

    /* ── Titlebar ── */
    #titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: rgba(255,255,255,0.05);
      cursor: grab;
      position: relative;
      z-index: 2;
    }
    #titlebar span { font-size: 11px; opacity: 0.5; }
    #titlebar-right { display: flex; align-items: center; gap: 8px; }
    #settings-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.4); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0 2px;
      transition: color 0.15s;
    }
    #settings-btn:hover { color: rgba(255,255,255,0.85); }
    #close-btn {
      background: #ff5f57; border: none;
      border-radius: 50%; width: 12px; height: 12px;
      cursor: pointer; flex-shrink: 0;
    }

    /* ── Settings panel — in normal flow, shown/hidden ── */
    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px 12px 12px;
      background: rgba(15, 15, 25, 0.98);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: relative;
      z-index: 10;
    }
    #settings-panel.open { display: flex; }

    .setting-row { display: flex; flex-direction: column; gap: 4px; }
    .setting-row label {
      font-size: 10px; opacity: 0.5;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    #settings-mode-bar { display: flex; gap: 6px; }
    .mode-btn {
      flex: 1; padding: 5px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; background: transparent;
      color: rgba(255,255,255,0.4); font-size: 11px;
      cursor: pointer; transition: all 0.15s;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff; border-color: rgba(255,255,255,0.3);
    }
    #ably-key-input-wrap { display: flex; gap: 6px; }
    #ably-key-input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; color: #fff;
      font-size: 11px; padding: 5px 8px; outline: none;
      font-family: monospace;
    }
    #ably-key-input::placeholder { color: rgba(255,255,255,0.25); }
    #ably-key-input:focus { border-color: rgba(79,142,247,0.6); }
    #save-key-btn {
      padding: 5px 10px; border-radius: 6px;
      border: 1px solid rgba(79,142,247,0.4);
      background: rgba(79,142,247,0.15);
      color: rgba(140,190,255,0.9); font-size: 11px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    #save-key-btn:hover { background: rgba(79,142,247,0.3); }
    #key-status { font-size: 10px; opacity: 0.45; min-height: 14px; }

    /* ── Main content — hidden behind settings when open ── */
    #main-content { display: block; }
    #main-content.settings-open { display: none; }

    /* ── Image buttons ── */
    #buttons {
      display: flex; gap: 6px;
      padding: 8px 10px; justify-content: center;
    }
    #buttons.hidden { display: none; }
    .img-btn {
      width: 54px; height: 54px; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      cursor: pointer; transition: all 0.1s;
      padding: 0; overflow: hidden;
    }
    .img-btn img {
      width: 100%; height: 100%;
      object-fit: cover; display: block; pointer-events: none;
    }
    .img-btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.4); transform: scale(1.05);
    }
    .img-btn.selected {
      border-color: #4f8ef7; box-shadow: 0 0 8px rgba(79,142,247,0.5);
    }
    .img-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Sequence rows ── */
    #sequences { padding: 4px 10px 6px; display: flex; flex-direction: column; gap: 4px; }
    .seq-row { display: flex; align-items: center; gap: 6px; }
    .seq-label {
      font-size: 10px; opacity: 0.4;
      width: 44px; text-align: right; flex-shrink: 0;
    }
    .seq-label.me { opacity: 0.7; color: #4f8ef7; }
    .seq-slots { display: flex; gap: 4px; }
    .slot {
      width: 36px; height: 36px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      overflow: hidden; display: flex;
      align-items: center; justify-content: center;
    }
    .slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slot.empty { background: rgba(255,255,255,0.04); }
    .slot.majority { border-color: #4fe77a; box-shadow: 0 0 6px rgba(79,231,122,0.3); }
    .slot.conflict  { border-color: rgba(247,162,79,0.6); box-shadow: 0 0 6px rgba(247,162,79,0.2); }

    hr { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 2px 10px; }

    #bottom-bar {
      display: flex; align-items: center;
      justify-content: space-between; padding: 4px 10px 8px;
    }
    #status { font-size: 10px; opacity: 0.35; }
    #clear-btn {
      padding: 4px 10px; border-radius: 6px;
      border: 1px solid rgba(255,100,100,0.4);
      background: rgba(255,100,100,0.1);
      color: rgba(255,120,120,0.9); font-size: 11px;
      cursor: pointer; transition: all 0.15s;
    }
    #clear-btn:hover { background: rgba(255,100,100,0.25); }
    #clear-btn.hidden { display: none; }
  </style>
</head>
<body>
<div id="shell">

  <div id="titlebar">
    <span>⬡ Overlay</span>
    <div id="titlebar-right">
      <button id="settings-btn" title="Settings">⚙</button>
      <button id="close-btn" title="Close"></button>
    </div>
  </div>

  <!-- Settings in normal flow — pushes nothing since main-content hides -->
  <div id="settings-panel">
    <div class="setting-row">
      <label>Mode</label>
      <div id="settings-mode-bar">
        <button class="mode-btn active" id="btn-leader" onclick="setMode('leader')">Leader</button>
        <button class="mode-btn" id="btn-viewer" onclick="setMode('viewer')">Viewer</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Ably API Key</label>
      <div id="ably-key-input-wrap">
        <input id="ably-key-input" type="password" placeholder="paste your key here…" autocomplete="off" spellcheck="false">
        <button id="save-key-btn" onclick="saveAblyKey()">Save & Connect</button>
      </div>
      <div id="key-status"></div>
    </div>
  </div>

  <!-- Main content hidden while settings open -->
  <div id="main-content">
    <div id="buttons">
      <button class="img-btn" onclick="handleClick(1)"><img src="images/1.png" alt="1"></button>
      <button class="img-btn" onclick="handleClick(2)"><img src="images/2.png" alt="2"></button>
      <button class="img-btn" onclick="handleClick(3)"><img src="images/3.png" alt="3"></button>
      <button class="img-btn" onclick="handleClick(4)"><img src="images/4.png" alt="4"></button>
      <button class="img-btn" onclick="handleClick(5)"><img src="images/5.png" alt="5"></button>
    </div>
    <div id="sequences">
      <div class="seq-row" id="majority-row">
        <div class="seq-label"></div>
        <div class="seq-slots" id="majority-slots"></div>
      </div>
      <hr>
    </div>
    <div id="bottom-bar">
      <div id="status">Ably: not connected</div>
      <button id="clear-btn" onclick="clearSequence()">Clear</button>
    </div>
  </div>

</div>
<script>
  const { ipcRenderer } = require('electron')

  const CHANNEL   = 'overlay-sequence'
  const SLOTS     = 5
  const IMG       = n => `images/${n}.png`
  const KEY_STORE = 'overlay_ably_key'
  const ID_STORE  = 'overlay_leader_id'

  let mode = 'leader'
  let settingsOpen = false
  let mySequence = []
  let leaderMap = {}
  let ablyClient = null
  let channel = null

  const MY_ID = (() => {
    let id = localStorage.getItem(ID_STORE)
    if (!id) { id = Math.random().toString(36).slice(2, 8); localStorage.setItem(ID_STORE, id) }
    return id
  })()

  // ── Settings ──────────────────────────────────────────
  const settingsBtn   = document.getElementById('settings-btn')
  const settingsPanel = document.getElementById('settings-panel')
  const mainContent   = document.getElementById('main-content')
  const ablyInput     = document.getElementById('ably-key-input')

  settingsBtn.addEventListener('click', () => {
    settingsOpen = !settingsOpen
    settingsPanel.classList.toggle('open', settingsOpen)
    mainContent.classList.toggle('settings-open', settingsOpen)
    if (settingsOpen) {
      const stored = localStorage.getItem(KEY_STORE)
      if (stored) ablyInput.value = stored
    }
    autoResize()
  })

  function saveAblyKey() {
    const key = ablyInput.value.trim()
    if (!key) { setKeyStatus('Please enter a key'); return }
    localStorage.setItem(KEY_STORE, key)
    setKeyStatus('Saved — connecting…')
    connectAbly(key)
  }
  function setKeyStatus(msg) { document.getElementById('key-status').textContent = msg }

  // ── Mode ──────────────────────────────────────────────
  function setMode(m) {
    mode = m
    document.getElementById('btn-leader').classList.toggle('active', m === 'leader')
    document.getElementById('btn-viewer').classList.toggle('active', m === 'viewer')
    document.getElementById('buttons').classList.toggle('hidden', m === 'viewer')
    document.getElementById('clear-btn').classList.toggle('hidden', m === 'viewer')
    if (m === 'leader' && !leaderMap[MY_ID]) leaderMap[MY_ID] = { sequence: [], label: 'You' }
    if (m === 'viewer') { mySequence = []; updateMyEntry() }
    renderAll()
  }

  // ── Button logic ──────────────────────────────────────
  function handleClick(n) {
    if (mode !== 'leader') return
    if (mySequence.length >= SLOTS) return
    mySequence.push(n)
    updateMyEntry(); renderAll(); publish()
  }

  function clearSequence() {
    mySequence = []
    updateMyEntry(); renderAll(); publish()
  }

  function updateMyEntry() {
    if (!leaderMap[MY_ID]) leaderMap[MY_ID] = { sequence: [], label: 'You' }
    leaderMap[MY_ID].sequence = [...mySequence]
  }

  // ── Majority ──────────────────────────────────────────
  function computeMajority() {
    const leaders = Object.values(leaderMap)
    if (!leaders.length) return Array(SLOTS).fill(null)
    return Array.from({ length: SLOTS }, (_, pos) => {
      const votes = {}
      leaders.forEach(({ sequence }) => {
        const v = sequence[pos]
        if (v !== undefined) votes[v] = (votes[v] || 0) + 1
      })
      if (!Object.keys(votes).length) return null
      const max = Math.max(...Object.values(votes))
      const winners = Object.keys(votes).filter(k => votes[k] === max)
      return winners.length === 1 ? parseInt(winners[0]) : null
    })
  }

  // ── Render ────────────────────────────────────────────
  function renderAll() {
    const majority = computeMajority()
    renderMajority(majority)
    renderLeaderRows(majority)
    renderInputButtons()
    autoResize()
  }

  function makeImgSlot(value, extraClass) {
    const d = document.createElement('div')
    d.className = 'slot' + (extraClass ? ' ' + extraClass : '') + (value === null ? ' empty' : '')
    if (value !== null) {
      const img = document.createElement('img')
      img.src = IMG(value); img.alt = value
      d.appendChild(img)
    }
    return d
  }

  function renderMajority(majority) {
    const el = document.getElementById('majority-slots')
    el.innerHTML = ''
    majority.forEach(v => el.appendChild(makeImgSlot(v, v !== null ? 'majority' : '')))
  }

  function renderLeaderRows(majority) {
    document.querySelectorAll('.leader-row').forEach(r => r.remove())
    const container = document.getElementById('sequences')
    Object.entries(leaderMap).forEach(([id, { sequence, label }]) => {
      if (mode === 'viewer' && id === MY_ID) return
      const row = document.createElement('div')
      row.className = 'seq-row leader-row'
      const lbl = document.createElement('div')
      lbl.className = 'seq-label' + (id === MY_ID ? ' me' : '')
      lbl.textContent = id === MY_ID ? 'You' : label
      row.appendChild(lbl)
      const slots = document.createElement('div')
      slots.className = 'seq-slots'
      for (let i = 0; i < SLOTS; i++) {
        const v = sequence[i] !== undefined ? sequence[i] : null
        const maj = majority[i]
        const cls = v !== null && maj !== null && v !== maj ? 'conflict' : ''
        slots.appendChild(makeImgSlot(v, cls))
      }
      row.appendChild(slots)
      container.appendChild(row)
    })
  }

  function renderInputButtons() {
    const used = new Set(mySequence)
    document.querySelectorAll('.img-btn').forEach((b, i) => {
      b.classList.toggle('selected', used.has(i + 1))
    })
  }

  // ── Resize ────────────────────────────────────────────
  function autoResize() {
    requestAnimationFrame(() => {
      const h = document.getElementById('shell').offsetHeight
      const w = document.getElementById('shell').offsetWidth
      ipcRenderer.send('resize-window', { width: w, height: h })
    })
  }

  // ── Ably ──────────────────────────────────────────────
  function connectAbly(key) {
    if (ablyClient) { try { ablyClient.close() } catch(e) {} }
    try {
      ablyClient = new Ably.Realtime({ key })
      channel = ablyClient.channels.get(CHANNEL)
      ablyClient.connection.on('connected', () => { setStatus('Ably: connected ✓'); setKeyStatus('Connected ✓') })
      ablyClient.connection.on('disconnected', () => setStatus('Ably: disconnected'))
      ablyClient.connection.on('failed', () => { setStatus('Ably: failed'); setKeyStatus('Connection failed — check key') })
      channel.subscribe('sequence', msg => {
        const { id, sequence, label } = msg.data
        if (id === MY_ID) return
        if (!leaderMap[id]) leaderMap[id] = { sequence: [], label }
        leaderMap[id].sequence = sequence
        renderAll()
      })
    } catch(e) { setStatus('Ably error'); setKeyStatus('Error — check key format') }
  }

  function publish() {
    if (!channel) return
    const otherCount = Object.keys(leaderMap).filter(k => k !== MY_ID).length
    channel.publish('sequence', { id: MY_ID, label: `Leader ${otherCount + 1}`, sequence: mySequence })
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg }

  // ── Dragging ──────────────────────────────────────────
  let dragging = false, startX, startY
  document.getElementById('titlebar').addEventListener('mousedown', e => { dragging = true; startX = e.screenX; startY = e.screenY })
  document.addEventListener('mousemove', e => {
    if (!dragging) return
    ipcRenderer.send('move-window', { x: e.screenX - startX, y: e.screenY - startY })
    startX = e.screenX; startY = e.screenY
  })
  document.addEventListener('mouseup', () => dragging = false)
  document.getElementById('close-btn').addEventListener('click', () => ipcRenderer.send('close-app'))

  // ── Boot ──────────────────────────────────────────────
  const s = document.createElement('script')
  s.src = 'https://cdn.ably.com/lib/ably.min-2.js'
  s.onload = () => {
    const stored = localStorage.getItem(KEY_STORE)
    if (stored) { ablyInput.value = stored; connectAbly(stored) }
    else setStatus('Open settings to add Ably key')
  }
  s.onerror = () => setStatus('Failed to load Ably SDK')
  document.head.appendChild(s)

  leaderMap[MY_ID] = { sequence: [], label: 'You' }
  setMode('leader')
</script>
</body>
</html>
